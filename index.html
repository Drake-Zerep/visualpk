<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Range Visualizer - NL2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            font-size: 14px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.5em;
            background: linear-gradient(45deg, #00f2ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .position-btn {
            padding: 8px 20px;
            font-size: 0.9em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid transparent;
            backdrop-filter: blur(10px);
        }

        .position-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4);
        }

        .position-btn.active {
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        .position-btn.utg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .position-btn.mp { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .position-btn.co { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .position-btn.bu { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

        .main-content {
            display: flex;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        .matrix-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .position-title {
            text-align: center;
            font-size: 1.3em;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 8px;
            background: rgba(0, 242, 255, 0.2);
            border: 2px solid #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .search-box {
            width: 100%;
            padding: 8px;
            font-size: 0.85em;
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            margin-bottom: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        .matrix-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 2px;
            width: 100%;
            max-width: 550px;
            aspect-ratio: 1;
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.55em;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            transform: scale(1.2);
            z-index: 10;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
        }

        .cell.fold { 
            background: rgba(240, 230, 200, 0.3); 
            color: #888;
        }
        .cell.or { 
            background: rgba(0, 150, 255, 0.7); 
            color: #fff;
            border-color: rgba(0, 150, 255, 1);
        }
        .cell.call3bet { 
            background: rgba(0, 80, 180, 0.9); 
            color: #fff;
            border-color: rgba(0, 80, 180, 1);
        }
        .cell.bet4 { 
            background: rgba(255, 180, 0, 0.9); 
            color: #000;
            border-color: rgba(255, 180, 0, 1);
        }
        .cell.bet4bluff { 
            background: rgba(255, 50, 50, 0.9); 
            color: #fff;
            border-color: rgba(255, 50, 50, 1);
        }

        .side-panel {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .legend {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .legend h3 {
            margin-bottom: 10px;
            color: #00f2ff;
            font-size: 1.1em;
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
            padding-bottom: 5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
        }

        .legend-text {
            font-size: 0.75em;
            line-height: 1.2;
        }

        .hand-info {
            background: rgba(0, 242, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            text-align: center;
            flex: 1;
        }

        .hand-name {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 8px;
            color: #00f2ff;
        }

        .hand-action {
            font-size: 0.95em;
            padding: 5px 15px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 8px;
            font-weight: bold;
        }

        .hand-info p {
            font-size: 0.8em;
            color: #a0a0a0;
            margin-top: 8px;
        }

        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
            filter: blur(80px);
            z-index: -1;
        }

        .glow-1 {
            background: #00f2ff;
            top: 10%;
            left: 10%;
            animation: float 8s ease-in-out infinite;
        }

        .glow-2 {
            background: #ff00ff;
            bottom: 10%;
            right: 10%;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
            .side-panel {
                width: 100%;
                flex-direction: row;
            }
            .legend, .hand-info {
                flex: 1;
            }
            .matrix {
                max-width: 100%;
            }
        }
    </style>
</head>

            <div class="side-panel">

                    <div class="legend-item">
                        <div class="legend-color" style="background: rgba(0, 80, 180, 0.9);"></div>
                        <div class="legend-text"><strong>Call 3Bet</strong><br>Continuar vs 3-bet</div>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: rgba(255, 180, 0, 0.9);"></div>
                        <div class="legend-text"><strong>4Bet</strong><br>Resubir (value)</div>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: rgba(255, 50, 50, 0.9);"></div>
                        <div class="legend-text"><strong>4Bet Bluff</strong><br>Resubir (bluff)</div>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: rgba(240, 230, 200, 0.3);"></div>
                        <div class="legend-text"><strong>Fold</strong><br>No jugar</div>

                </div>

                <div class="hand-info" id="handInfo">
                    <div class="hand-name">Selecciona</div>
                    <p>Click en una mano</p>
                </div>
            </div>
        </div>
    </div>

            matrix.innerHTML = '';

            for (let i = 0; i < 13; i++) {
                for (let j = 0; j < 13; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    let hand;
                    if (i === j) {
                        hand = ranks[i] + ranks[j];
                    } else if (i < j) {
                        hand = ranks[i] + ranks[j] + 's';
                    } else {
                        hand = ranks[j] + ranks[i] + 'o';
                    }

                    cell.textContent = hand;
                    cell.dataset.hand = hand;

                    const range = ranges[currentPosition];
                    if (range.bet4bluff.includes(hand)) {
                        cell.classList.add('bet4bluff');
                    } else if (range.bet4.includes(hand)) {
                        cell.classList.add('bet4');
                    } else if (range.call3bet.includes(hand)) {
                        cell.classList.add('call3bet');
                    } else if (range.or.includes(hand)) {
                        cell.classList.add('or');
                    } else {
                        cell.classList.add('fold');
                    }

                    cell.addEventListener('click', () => showHandInfo(hand));
                    matrix.appendChild(cell);
                }
            }
        }

        function showHandInfo(hand) {
            const range = ranges[currentPosition];
            const handInfo = document.getElementById('handInfo');
            let action, actionClass, description;

            if (range.bet4bluff.includes(hand)) {
                action = '4Bet Bluff';
                actionClass = 'bet4bluff';
                description = 'Resubida como bluff';
            } else if (range.bet4.includes(hand)) {
                action = '4Bet Value';
                actionClass = 'bet4';
                description = 'Resubida por valor';
            } else if (range.call3bet.includes(hand)) {
                action = 'Call 3Bet';
                actionClass = 'call3bet';
                description = 'Pagamos 3-bet';
            } else if (range.or.includes(hand)) {
                action = 'Open Raise';
                actionClass = 'or';
                description = 'Abrimos con raise';
            } else {
                action = 'Fold';
                actionClass = 'fold';
                description = 'No jugamos';
            }

            handInfo.innerHTML = `
                <div class="hand-name">${hand}</div>
                <div class="hand-action ${actionClass}" style="background: ${getActionColor(actionClass)}; color: ${actionClass === 'bet4' ? '#000' : '#fff'};">
                    ${action}
                </div>
                <p>${description}</p>
            `;
        }

        function getActionColor(actionClass) {
            const colors = {
                'bet4bluff': 'rgba(255, 50, 50, 0.9)',
                'bet4': 'rgba(255, 180, 0, 0.9)',
                'call3bet': 'rgba(0, 80, 180, 0.9)',
                'or': 'rgba(0, 150, 255, 0.7)',
                'fold': 'rgba(240, 230, 200, 0.3)'
            };
            return colors[actionClass];
        }

        function changePosition(position) {
            currentPosition = position;
            document.getElementById('positionTitle').textContent = position;
            
            document.querySelectorAll('.position-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.position-btn.${position.toLowerCase()}`).classList.add('active');
            
            generateMatrix();
            
            document.getElementById('handInfo').innerHTML = `
                <div class="hand-name">${position}</div>
                <p>Click en una mano</p>
            `;
        }

        document.querySelector('.search-box').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toUpperCase().trim();
            const cells = document.querySelectorAll('.cell');
            
            cells.forEach(cell => {
                const hand = cell.dataset.hand;
                if (searchTerm && hand.includes(searchTerm)) {
                    cell.style.transform = 'scale(1.3)';
                    cell.style.zIndex = '100';
                    cell.style.boxShadow = '0 0 15px rgba(0, 242, 255, 0.8)';
                } else {
                    cell.style.transform = 'scale(1)';
                    cell.style.zIndex = '1';
                    cell.style.boxShadow = 'none';
                }
            });

            if (searchTerm) {
                const matchingCell = Array.from(cells).find(cell => cell.dataset.hand === searchTerm);
                if (matchingCell) {
                    matchingCell.click();
                }
            }
        });

        generateMatrix();
    </script>
</body>
</html>
